<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>관리자 가입 요청 | 과수정 교원노동조합</title>
    <link rel="icon" href="assets/images/smitu-thumbnail.png" />
    <link rel="apple-touch-icon" href="assets/images/smitu-thumbnail.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="admin/admin.css?v=20260716-site-login" />
    <script src="js/signup.js?v=20260716-site-login" defer></script>
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <a class="auth-logo" href="index.html" aria-label="사이트로 돌아가기">
        <img src="assets/images/smitu-logo-full.png?v=20260716-logo" alt="SMITU 과수정 교원노동조합" />
      </a>

      <section class="auth-panel" aria-labelledby="signup-title">
        <p class="eyebrow">Admin Request</p>
        <h1 id="signup-title">관리자 가입 요청</h1>
        <p>일반 회원은 받지 않습니다. 기존 관리자가 승인한 계정만 관리자 화면에 들어갈 수 있습니다.</p>

        <form class="auth-form" id="signup-form">
          <label>
            <span>이름</span>
            <input name="name" autocomplete="name" required />
          </label>
          <label>
            <span>이메일</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input name="password" type="password" autocomplete="new-password" minlength="10" required />
          </label>
          <button class="primary-button" type="submit">가입 요청 보내기</button>
        </form>

        <p class="auth-message" id="signup-message" role="status" aria-live="polite"></p>
        <p class="auth-link-copy">이미 승인되었나요? <a href="login.html">로그인</a></p>
      </section>
    </main>
  </body>
</html>
