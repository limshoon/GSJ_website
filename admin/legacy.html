<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>기존 사이트 관리 | 과수정 교원노동조합</title>
    <link rel="icon" href="../assets/images/smitu-thumbnail.png" />
    <link rel="apple-touch-icon" href="../assets/images/smitu-thumbnail.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="admin.css?v=20260716-legacy-admin" />
    <script src="admin.js?v=20260716-legacy-admin" defer></script>
  </head>
  <body>
    <header class="admin-header">
      <a class="admin-brand" href="../index.html" aria-label="사이트 홈으로 이동">
        <span>과수정</span>
        <strong>기존 사이트 관리</strong>
      </a>
      <a class="admin-preview-link" href="../index.html" target="_blank" rel="noreferrer">사이트 보기</a>
    </header>

    <main class="admin-shell">
      <section class="connection-panel" aria-labelledby="connection-title">
        <div>
          <p class="eyebrow">GitHub Pages CMS</p>
          <h1 id="connection-title">토큰으로 직접 수정합니다</h1>
          <p class="connection-copy">
            Netlify CMS 설정 전 임시로 사용할 수 있는 기존 관리자 화면입니다. 여러 관리자에게는 /admin/ 화면을 사용하세요.
          </p>
        </div>

        <form class="connection-form" id="connection-form">
          <label>
            <span>소유자</span>
            <input name="owner" autocomplete="username" required />
          </label>
          <label>
            <span>저장소</span>
            <input name="repo" required />
          </label>
          <label>
            <span>브랜치</span>
            <input name="branch" required />
          </label>
          <label class="token-field">
            <span>GitHub 토큰</span>
            <input name="token" type="password" autocomplete="off" placeholder="Contents 읽기/쓰기 권한 토큰" required />
          </label>
          <button class="primary-button" type="submit">연결하기</button>
        </form>
      </section>

      <section class="editor-shell" aria-labelledby="editor-title">
        <div class="editor-toolbar">
          <div>
            <p class="eyebrow">Editable Content</p>
            <h2 id="editor-title">사이트 콘텐츠</h2>
          </div>
          <button class="primary-button" type="button" id="save-button" disabled aria-busy="false">저장하고 게시</button>
        </div>

        <div class="status-message" id="status-message" role="status" aria-live="polite">
          GitHub에 연결하면 현재 콘텐츠를 불러옵니다.
        </div>

        <div class="editor" id="editor"></div>
      </section>
    </main>
  </body>
</html>
