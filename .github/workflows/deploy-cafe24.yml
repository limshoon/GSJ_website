name: Deploy to Cafe24

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cafe24-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy by FTP
        env:
          FTP_HOST: ${{ secrets.CAFE24_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.CAFE24_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.CAFE24_FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.CAFE24_SERVER_DIR }}
        run: |
          set -euo pipefail

          REMOTE_CANDIDATES=()
          if [ -n "${FTP_DIR:-}" ]; then
            REMOTE_CANDIDATES+=("$FTP_DIR")
          fi
          REMOTE_CANDIDATES+=(
            "." "./"
            "www" "html" "public_html" "htdocs" "web"
            "${FTP_USERNAME}" "${FTP_USERNAME}/www" "/${FTP_USERNAME}/www"
            "/home/${FTP_USERNAME}/www"
            "/home/hosting_users/${FTP_USERNAME}/www"
            "smitu.kr"
          )

          REMOTE_DIR=""
          TEST_DIR=".codex-deploy-check-${GITHUB_RUN_ID}"
          for candidate in "${REMOTE_CANDIDATES[@]}"; do
            echo "Checking FTP directory candidate: ${candidate}"
            if lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:max-retries 1
          set net:timeout 15
          cd "$candidate"
          mkdir "$TEST_DIR"
          rmdir "$TEST_DIR"
          bye
          EOF
            then
              REMOTE_DIR="$candidate"
              break
            fi
          done

          if [ -z "$REMOTE_DIR" ]; then
            echo "::error::Could not find a writable FTP directory. Remote root listing follows."
            timeout 20s lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF || true
          set ftp:ssl-allow no
          set ftp:passive-mode on
          pwd
          cls -la
          bye
          EOF
            exit 1
          fi

          echo "Using FTP directory: ${REMOTE_DIR}"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:max-retries 2
          set net:timeout 20
          cd "$REMOTE_DIR"
          mirror --reverse --verbose --exclude-glob ".git/**" --exclude-glob ".github/**" --exclude-glob ".DS_Store" --exclude-glob "*/.DS_Store" --exclude-glob "config/config.php" --exclude-glob "config/database.php" --exclude-glob ".env" --exclude-glob "uploads/**" --exclude-glob "README.md" --exclude-glob "CAFE24_SETUP.md" ./ ./
          mkdir -p uploads
          put uploads/.htaccess -o uploads/.htaccess
          bye
          EOF
