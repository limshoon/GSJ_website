name: Deploy to Cafe24

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cafe24-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CAFE24_FTP_HOST }}
          username: ${{ secrets.CAFE24_FTP_USERNAME }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          server-dir: ${{ secrets.CAFE24_SERVER_DIR }}
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .DS_Store
            **/.DS_Store
            config/config.php
            config/database.php
            .env
            uploads/**
            README.md
            CAFE24_SETUP.md
