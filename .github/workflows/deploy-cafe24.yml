name: Deploy to Cafe24

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cafe24-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass

      - name: Deploy by SFTP
        env:
          SFTP_HOST: ${{ secrets.CAFE24_FTP_HOST }}
          SFTP_USERNAME: ${{ secrets.CAFE24_FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.CAFE24_FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.CAFE24_SERVER_DIR }}
        run: |
          set -euo pipefail

          SSH_OPTIONS=(
            -P 22
            -oBatchMode=no
            -oStrictHostKeyChecking=no
            -oUserKnownHostsFile=/dev/null
            -oPreferredAuthentications=password
            -oPubkeyAuthentication=no
          )

          REMOTE_CANDIDATES=()
          if [ -n "${SFTP_DIR:-}" ]; then
            REMOTE_CANDIDATES+=("$SFTP_DIR")
          fi
          REMOTE_CANDIDATES+=(
            "." "./"
            "www" "html" "public_html" "htdocs" "web"
            "${SFTP_USERNAME}" "${SFTP_USERNAME}/www" "/${SFTP_USERNAME}/www"
            "/home/${SFTP_USERNAME}/www"
            "/home/hosting_users/${SFTP_USERNAME}/www"
            "smitu.kr"
          )

          REMOTE_DIR=""
          TEST_DIR=".codex-deploy-check-${GITHUB_RUN_ID}"
          for candidate in "${REMOTE_CANDIDATES[@]}"; do
            echo "Checking SFTP directory candidate: ${candidate}"
            if SSHPASS="$SFTP_PASSWORD" sshpass -e sftp "${SSH_OPTIONS[@]}" "$SFTP_USERNAME@$SFTP_HOST" <<EOF
          cd "$candidate"
          mkdir "$TEST_DIR"
          rmdir "$TEST_DIR"
          bye
          EOF
            then
              REMOTE_DIR="$candidate"
              break
            fi
          done

          if [ -z "$REMOTE_DIR" ]; then
            echo "::error::Could not find a writable SFTP directory. Remote root listing follows."
            timeout 20s env SSHPASS="$SFTP_PASSWORD" sshpass -e sftp "${SSH_OPTIONS[@]}" "$SFTP_USERNAME@$SFTP_HOST" <<EOF || true
          pwd
          ls -la
          bye
          EOF
            exit 1
          fi

          STAGING_DIR="$(mktemp -d)"
          rsync -a \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".DS_Store" \
            --exclude="*/.DS_Store" \
            --exclude="config/config.php" \
            --exclude="config/database.php" \
            --exclude=".env" \
            --exclude="uploads/" \
            --exclude="README.md" \
            --exclude="CAFE24_SETUP.md" \
            ./ "$STAGING_DIR/"

          echo "Using SFTP directory: ${REMOTE_DIR}"
          SSHPASS="$SFTP_PASSWORD" sshpass -e sftp "${SSH_OPTIONS[@]}" "$SFTP_USERNAME@$SFTP_HOST" <<EOF
          lcd "$STAGING_DIR"
          cd "$REMOTE_DIR"
          put -r *
          put .htaccess .htaccess
          -mkdir uploads
          lcd "$GITHUB_WORKSPACE"
          put uploads/.htaccess uploads/.htaccess
          bye
          EOF

      - name: Write production config
        env:
          SFTP_HOST: ${{ secrets.CAFE24_FTP_HOST }}
          SFTP_USERNAME: ${{ secrets.CAFE24_FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.CAFE24_FTP_PASSWORD }}
          SFTP_DIR: ${{ secrets.CAFE24_SERVER_DIR }}
          DB_HOST: ${{ secrets.CAFE24_DB_HOST || 'localhost' }}
          DB_NAME: ${{ secrets.CAFE24_DB_NAME || secrets.CAFE24_FTP_USERNAME }}
          DB_USERNAME: ${{ secrets.CAFE24_DB_USERNAME || secrets.CAFE24_FTP_USERNAME }}
          DB_PASSWORD: ${{ secrets.CAFE24_DB_PASSWORD || secrets.CAFE24_FTP_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.CAFE24_ADMIN_PASSWORD || 'admin1234' }}
        run: |
          set -euo pipefail

          php_escape() {
            local value="$1"
            value="${value//\\/\\\\}"
            value="${value//\'/\\\'}"
            printf '%s' "$value"
          }

          CONFIG_DIR="$(mktemp -d)"
          DB_HOST_ESC="$(php_escape "$DB_HOST")"
          DB_NAME_ESC="$(php_escape "$DB_NAME")"
          DB_USERNAME_ESC="$(php_escape "$DB_USERNAME")"
          DB_PASSWORD_ESC="$(php_escape "$DB_PASSWORD")"
          ADMIN_PASSWORD_ESC="$(php_escape "$ADMIN_PASSWORD")"

          cat > "$CONFIG_DIR/config.php" <<PHP
          <?php

          return [
              'db' => [
                  'host' => '${DB_HOST_ESC}',
                  'name' => '${DB_NAME_ESC}',
                  'user' => '${DB_USERNAME_ESC}',
                  'password' => '${DB_PASSWORD_ESC}',
                  'charset' => 'utf8mb4',
              ],

              'session' => [
                  'name' => 'smitu_admin_session',
                  'lifetime' => 28800,
                  'timeout' => 28800,
              ],

              'uploads' => [
                  'directory' => __DIR__ . '/../uploads',
                  'url' => '/uploads',
                  'max_size' => 10485760,
              ],

              'bootstrap_admin' => [
                  'email' => 'admin@example.com',
                  'password' => '${ADMIN_PASSWORD_ESC}',
                  'name' => '최고관리자',
              ],
          ];
          PHP

          cat > "$CONFIG_DIR/database.php" <<PHP
          <?php

          return [
              'host' => '${DB_HOST_ESC}',
              'dbname' => '${DB_NAME_ESC}',
              'username' => '${DB_USERNAME_ESC}',
              'password' => '${DB_PASSWORD_ESC}',
              'charset' => 'utf8mb4',
          ];
          PHP

          SSH_OPTIONS=(
            -P 22
            -oBatchMode=no
            -oStrictHostKeyChecking=no
            -oUserKnownHostsFile=/dev/null
            -oPreferredAuthentications=password
            -oPubkeyAuthentication=no
          )

          REMOTE_DIR="${SFTP_DIR:-/home/hosting_users/${SFTP_USERNAME}/www}"
          SSHPASS="$SFTP_PASSWORD" sshpass -e sftp "${SSH_OPTIONS[@]}" "$SFTP_USERNAME@$SFTP_HOST" <<EOF
          cd "$REMOTE_DIR"
          put "$CONFIG_DIR/config.php" config/config.php
          put "$CONFIG_DIR/database.php" config/database.php
          bye
          EOF

      - name: Run member table migration
        env:
          SSH_HOST: ${{ secrets.CAFE24_FTP_HOST }}
          SSH_USERNAME: ${{ secrets.CAFE24_FTP_USERNAME }}
          SSH_PASSWORD: ${{ secrets.CAFE24_FTP_PASSWORD }}
          SSH_DIR: ${{ secrets.CAFE24_SERVER_DIR }}
        run: |
          set -euo pipefail

          SSH_OPTIONS=(
            -p 22
            -oBatchMode=no
            -oStrictHostKeyChecking=no
            -oUserKnownHostsFile=/dev/null
            -oPreferredAuthentications=password
            -oPubkeyAuthentication=no
          )

          REMOTE_DIR="${SSH_DIR:-/home/hosting_users/${SSH_USERNAME}/www}"
          printf -v REMOTE_DIR_Q '%q' "$REMOTE_DIR"

          REMOTE_COMMAND="cd ${REMOTE_DIR_Q} && if command -v php >/dev/null 2>&1; then php -d display_errors=1 install/run_member_migration.php; elif [ -x /usr/local/php/bin/php ]; then /usr/local/php/bin/php -d display_errors=1 install/run_member_migration.php; else echo 'PHP CLI not found on server.' >&2; exit 1; fi"
          SSHPASS="$SSH_PASSWORD" sshpass -e ssh "${SSH_OPTIONS[@]}" "$SSH_USERNAME@$SSH_HOST" "$REMOTE_COMMAND"
