name: Deploy to Cafe24

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cafe24-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy by FTP
        env:
          FTP_HOST: ${{ secrets.CAFE24_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.CAFE24_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.CAFE24_FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.CAFE24_SERVER_DIR }}
        run: |
          set -euo pipefail

          REMOTE_DIR="${FTP_DIR:-/}"
          case "$REMOTE_DIR" in
            */) ;;
            *) REMOTE_DIR="${REMOTE_DIR}/" ;;
          esac

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:max-retries 2
          set net:timeout 20
          mkdir -p "$REMOTE_DIR"
          mirror --reverse --verbose --exclude-glob ".git/**" --exclude-glob ".github/**" --exclude-glob ".DS_Store" --exclude-glob "*/.DS_Store" --exclude-glob "config/config.php" --exclude-glob "config/database.php" --exclude-glob ".env" --exclude-glob "uploads/**" --exclude-glob "README.md" --exclude-glob "CAFE24_SETUP.md" ./ "$REMOTE_DIR"
          mkdir -p "$REMOTE_DIR/uploads"
          put uploads/.htaccess -o "$REMOTE_DIR/uploads/.htaccess"
          bye
          EOF
